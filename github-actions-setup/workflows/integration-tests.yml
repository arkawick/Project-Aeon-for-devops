name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aeon_test
          POSTGRES_USER: aeon
          POSTGRES_PASSWORD: aeon_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend
        run: pip install -r aeon/backend/requirements.txt

      - name: Start backend
        env:
          DATABASE_URL: postgresql://aeon:aeon_test@localhost:5432/aeon_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd aeon/backend
          uvicorn main:app --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aeon/frontend/package-lock.json

      - name: Install frontend
        run: cd aeon/frontend && npm ci

      - name: Build frontend
        run: cd aeon/frontend && npm run build

      - name: Install Playwright
        run: cd aeon/frontend && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd aeon/frontend && npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: aeon/frontend/playwright-report/
          retention-days: 7

      - name: Notify Aeon (failure)
        if: failure()
        env:
          AEON_URL: ${{ secrets.AEON_URL }}
        run: |
          curl -sf -X POST "${AEON_URL}/api/pipelines/ingest" \
            -H "Content-Type: application/json" \
            -H "bypass-tunnel-reminder: true" \
            -d "{
              \"source\": \"github\", \"name\": \"${{ github.workflow }}\",
              \"status\": \"failure\", \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\", \"run_id\": \"${{ github.run_id }}\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"error_summary\": \"E2E integration tests failed — see Playwright report\",
              \"commit_sha\": \"${{ github.sha }}\"
            }" || echo "Aeon notification failed (non-critical)"

      - name: Notify Aeon (success)
        if: success()
        env:
          AEON_URL: ${{ secrets.AEON_URL }}
        run: |
          curl -sf -X POST "${AEON_URL}/api/pipelines/ingest" \
            -H "Content-Type: application/json" \
            -H "bypass-tunnel-reminder: true" \
            -d "{
              \"source\": \"github\", \"name\": \"${{ github.workflow }}\",
              \"status\": \"success\", \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\", \"run_id\": \"${{ github.run_id }}\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"commit_sha\": \"${{ github.sha }}\"
            }" || echo "Aeon notification failed (non-critical)"
