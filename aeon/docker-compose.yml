version: '3.9'

services:
  # ── AI backend ──────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    # Override localhost addresses with Docker service names
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - JENKINS_URL=http://jenkins:8080
      - N8N_BASE_URL=http://n8n:5678
      - DATABASE_URL=postgresql://aeon:aeon@postgres:5432/aeon
      - REDIS_URL=redis://redis:6379
    depends_on:
      - chromadb
      - neo4j
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── React frontend ───────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped

  # ── CI/CD — Jenkins ─────────────────────────────────────────────────────────
  jenkins:
    build: ./jenkins
    ports:
      - "8088:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_data:/var/jenkins_home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Workflow automation — n8n ────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=aeon-demo-encryption-key-32chars!
      - N8N_USER_MANAGEMENT_JWT_SECRET=aeon-jwt-secret-for-demo-only!!
      # Skip email verification, allow anonymous access to webhooks
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=24
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Vector memory — ChromaDB ────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      # Chroma 1.x persists to /data (NOT /chroma/chroma) — mount the volume there
      # or all memory is lost on restart/reboot.
      - chroma_data:/data
    restart: unless-stopped
    # No healthcheck: the chromadb/chroma image is minimal (no curl/wget/python on
    # PATH) so there's nothing to probe with, and nothing depends on its health
    # status. A missing healthcheck reports a clean "Up" instead of a misleading
    # "unhealthy". The backend connects to it independently at startup.

  # ── Graph memory — Neo4j ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/aeon_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── PostgreSQL (incident DB) ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aeon
      POSTGRES_USER: aeon
      POSTGRES_PASSWORD: aeon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis (cache) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  jenkins_data:
  n8n_data:
  chroma_data:
  neo4j_data:
  postgres_data:
